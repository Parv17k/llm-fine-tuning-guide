<svg width="1200" height="630" xmlns="http://www.w3.org/2000/svg">
  <!-- Background -->
  <defs>
    <linearGradient id="bg" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#0d1117;stop-opacity:1" />
      <stop offset="100%" style="stop-color:#161b22;stop-opacity:1" />
    </linearGradient>
    <linearGradient id="accent" x1="0%" y1="0%" x2="100%" y2="0%">
      <stop offset="0%" style="stop-color:#58a6ff;stop-opacity:1" />
      <stop offset="100%" style="stop-color:#1f6feb;stop-opacity:1" />
    </linearGradient>
  </defs>

  <rect width="1200" height="630" fill="url(#bg)"/>

  <!-- Decorative circles -->
  <circle cx="1100" cy="100" r="200" fill="#1f6feb" opacity="0.1"/>
  <circle cx="100" cy="500" r="150" fill="#58a6ff" opacity="0.1"/>

  <!-- Main title -->
  <text x="60" y="180" font-family="-apple-system, BlinkMacSystemFont, 'Segoe UI', Helvetica, Arial, sans-serif" font-size="52" font-weight="700" fill="#ffffff" letter-spacing="-1">
    Your First LLM Fine-Tune
  </text>

  <!-- Subtitle -->
  <text x="60" y="250" font-family="-apple-system, BlinkMacSystemFont, 'Segoe UI', Helvetica, Arial, sans-serif" font-size="28" fill="#8b949e">
    A Step-by-Step Guide for Technical People
  </text>

  <!-- Tagline box -->
  <rect x="60" y="290" width="580" height="70" rx="8" fill="#161b22" stroke="#30363d" stroke-width="2"/>
  <text x="90" y="335" font-family="-apple-system, BlinkMacSystemFont, 'Segoe UI', Helvetica, Arial, sans-serif" font-size="22" fill="#58a6ff" font-weight="600">
    No ML background required
  </text>

  <!-- Key topics -->
  <text x="60" y="430" font-family="-apple-system, BlinkMacSystemFont, 'Segoe UI', Helvetica, Arial, sans-serif" font-size="20" fill="#c9d1d9" font-weight="600">
    Learn:
  </text>

  <!-- Topic pills -->
  <g transform="translate(60, 455)">
    <!-- LoRA -->
    <rect x="0" y="0" width="100" height="36" rx="18" fill="url(#accent)" opacity="0.2"/>
    <rect x="0" y="0" width="100" height="36" rx="18" stroke="#58a6ff" stroke-width="1.5" fill="none"/>
    <text x="50" y="24" font-family="-apple-system, BlinkMacSystemFont, 'Segoe UI', Helvetica, Arial, sans-serif" font-size="16" fill="#58a6ff" text-anchor="middle" font-weight="500">LoRA</text>

    <!-- QLoRA -->
    <rect x="115" y="0" width="120" height="36" rx="18" fill="none" stroke="#58a6ff" stroke-width="1.5"/>
    <text x="175" y="24" font-family="-apple-system, BlinkMacSystemFont, 'Segoe UI', Helvetica, Arial, sans-serif" font-size="16" fill="#58a6ff" text-anchor="middle" font-weight="500">QLoRA</text>

    <!-- DPO -->
    <rect x="250" y="0" width="100" height="36" rx="18" fill="none" stroke="#58a6ff" stroke-width="1.5"/>
    <text x="300" y="24" font-family="-apple-system, BlinkMacSystemFont, 'Segoe UI', Helvetica, Arial, sans-serif" font-size="16" fill="#58a6ff" text-anchor="middle" font-weight="500">DPO</text>

    <!-- ORPO -->
    <rect x="365" y="0" width="110" height="36" rx="18" fill="none" stroke="#58a6ff" stroke-width="1.5"/>
    <text x="420" y="24" font-family="-apple-system, BlinkMacSystemFont, 'Segoe UI', Helvetica, Arial, sans-serif" font-size="16" fill="#58a6ff" text-anchor="middle" font-weight="500">ORPO</text>
  </g>

  <!-- Second row of topics -->
  <g transform="translate(60, 510)">
    <!-- RAG -->
    <rect x="0" y="0" width="90" height="36" rx="18" fill="none" stroke="#58a6ff" stroke-width="1.5"/>
    <text x="45" y="24" font-family="-apple-system, BlinkMacSystemFont, 'Segoe UI', Helvetica, Arial, sans-serif" font-size="16" fill="#58a6ff" text-anchor="middle" font-weight="500">RAG</text>

    <!-- Deployment -->
    <rect x="105" y="0" width="140" height="36" rx="18" fill="none" stroke="#58a6ff" stroke-width="1.5"/>
    <text x="175" y="24" font-family="-apple-system, BlinkMacSystemFont, 'Segoe UI', Helvetica, Arial, sans-serif" font-size="16" fill="#58a6ff" text-anchor="middle" font-weight="500">Deployment</text>

    <!-- MLOps -->
    <rect x="260" y="0" width="110" height="36" rx="18" fill="none" stroke="#58a6ff" stroke-width="1.5"/>
    <text x="315" y="24" font-family="-apple-system, BlinkMacSystemFont, 'Segoe UI', Helvetica, Arial, sans-serif" font-size="16" fill="#58a6ff" text-anchor="middle" font-weight="500">MLOps</text>
  </g>

  <!-- GitHub branding -->
  <text x="1140" y="600" font-family="-apple-system, BlinkMacSystemFont, 'Segoe UI', Helvetica, Arial, sans-serif" font-size="16" fill="#8b949e" text-anchor="end">
    github.com/Parv17k/llm-fine-tuning-guide
  </text>
</svg>
