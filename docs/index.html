<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>LLM Fine-Tuning Guide</title>
  <meta name="description" content="A Step-by-Step Guide for Technical People - Learn to fine-tune LLMs from scratch">

  <!-- Docsify Theme CSS - Dark theme by default -->
  <link rel="stylesheet" href="//cdn.jsdelivr.net/npm/docsify@4/themes/dark.min.css" id="theme-css" />

  <!-- Theme Toggle Styles -->
  <style>
    .theme-toggle {
      position: fixed;
      top: 1rem;
      right: 1rem;
      z-index: 1000;
      background: #161b22;
      border: 1px solid #30363d;
      border-radius: 0.5rem;
      padding: 0.5rem 1rem;
      cursor: pointer;
      color: #c9d1d9;
      font-size: 0.875rem;
      display: flex;
      align-items: center;
      gap: 0.5rem;
      transition: all 0.2s ease;
    }

    .theme-toggle:hover {
      background: #21262d;
    }

    .theme-toggle svg {
      width: 18px;
      height: 18px;
    }

    /* Reader Mode Styles */
    .reader-mode-active .sidebar,
    .reader-mode-active .app-nav {
      display: none !important;
    }

    .reader-mode-active .content {
      margin-left: 0 !important;
      max-width: 800px !important;
      margin: 0 auto;
      padding: 2rem;
    }

    .reader-mode-toggle {
      position: fixed;
      top: 1rem;
      right: 8rem;
      z-index: 1000;
      background: #161b22;
      border: 1px solid #30363d;
      border-radius: 0.5rem;
      padding: 0.5rem 1rem;
      cursor: pointer;
      color: #c9d1d9;
      font-size: 0.875rem;
      display: flex;
      align-items: center;
      gap: 0.5rem;
      transition: all 0.2s ease;
    }

    .reader-mode-toggle:hover {
      background: #21262d;
    }

    /* Dark Theme Overrides - apply to html and body directly */
    html.dark-theme,
    body.dark-theme {
      --theme-color: #3b82f6;
      --base-background-color: #0a0a0a;
      --base-color: #e5e5e5;
      --sidebar-background-color: #121212;
      --sidebar-nav-color: #a0a0a0;
      --sidebar-nav-strong-color: #ffffff;
      --code-background-color: #1a1a1a;
      --code-theme-color: #60a5fa;
      --heading-color: #ffffff;
      --link-color: #60a5fa;
      --blockquote-color: #a0a0a0;
      --border-color: #2a2a2a;
      background-color: #0a0a0a !important;
    }

    html.dark-theme {
      background: #0a0a0a !important;
      min-height: 100vh;
    }

    body.dark-theme {
      min-height: 100vh;
    }

    /* Ensure app container and content fill viewport */
    body.dark-theme #app,
    body.dark-theme .app {
      background: #0a0a0a !important;
      min-height: 100vh;
    }

    /* Additional dark theme overrides for docsify elements */
    body.dark-theme .markdown-section h1,
    body.dark-theme .markdown-section h2,
    body.dark-theme .markdown-section h3,
    body.dark-theme .markdown-section h4,
    body.dark-theme .markdown-section h5,
    body.dark-theme .markdown-section h6 {
      color: #ffffff !important;
    }

    body.dark-theme .markdown-section pre,
    body.dark-theme .markdown-section code {
      background: #1a1a1a !important;
      color: #e5e5e5 !important;
    }

    body.dark-theme .markdown-section blockquote {
      background: #1a1a1a !important;
      color: #a0a0a0 !important;
      border-left: 4px solid #3b82f6 !important;
    }

    body.dark-theme .sidebar {
      background: #121212 !important;
      color: #a0a0a0 !important;
    }

    body.dark-theme .sidebar li {
      color: #a0a0a0 !important;
    }

    body.dark-theme .sidebar strong {
      color: #ffffff !important;
    }

    /* Sidebar toggle button */
    body.dark-theme .sidebar-toggle,
    body.dark-theme .sidebar-toggle-button {
      background: #121212 !important;
      border-color: #2a2a2a !important;
    }

    body.dark-theme .sidebar-toggle span,
    body.dark-theme .sidebar-toggle-button span {
      background-color: #e5e5e5 !important;
    }

    body.dark-theme .sidebar-toggle:hover,
    body.dark-theme .sidebar-toggle-button:hover {
      background: #1a1a1a !important;
    }

    body.dark-theme .markdown-section table tr,
    body.dark-theme .markdown-section table tr:nth-child(2n) {
      background: #121212 !important;
    }

    body.dark-theme .markdown-section table th,
    body.dark-theme .markdown-section table td {
      border-color: #2a2a2a !important;
    }

    /* Main content area background */
    body.dark-theme .content,
    body.dark-theme .markdown-section,
    body.dark-theme #main,
    body.dark-theme .content main {
      background: #0a0a0a !important;
    }

    body.dark-theme .markdown-section p,
    body.dark-theme .markdown-section li {
      color: #e5e5e5 !important;
    }

    /* Inline code styling */
    body.dark-theme .markdown-section :not(pre) > code,
    body.dark-theme :not(pre) > code {
      background: #1a1a1a !important;
      color: #60a5fa !important;
      padding: 0.2em 0.4em !important;
      border-radius: 3px !important;
      font-size: 0.9em !important;
    }

    /* Code blocks styling */
    body.dark-theme .markdown-section pre,
    body.dark-theme pre {
      background: #1a1a1a !important;
      border: 1px solid #2a2a2a !important;
    }

    /* Preserve Prism syntax highlighting colors */
    body.dark-theme .markdown-section pre code,
    body.dark-theme pre code {
      background: transparent !important;
      padding: 0 !important;
    }

    body.dark-theme .token.comment,
    body.dark-theme .token.prolog,
    body.dark-theme .token.doctype,
    body.dark-theme .token.cdata {
      color: #6a9955 !important;
    }

    body.dark-theme .token.punctuation {
      color: #d4d4d4 !important;
    }

    body.dark-theme .token.property,
    body.dark-theme .token.tag,
    body.dark-theme .token.boolean,
    body.dark-theme .token.number,
    body.dark-theme .token.constant,
    body.dark-theme .token.symbol {
      color: #b5cea8 !important;
    }

    body.dark-theme .token.selector,
    body.dark-theme .token.attr-name,
    body.dark-theme .token.string,
    body.dark-theme .token.char,
    body.dark-theme .token.builtin,
    body.dark-theme .token.inserted {
      color: #ce9178 !important;
    }

    body.dark-theme .token.operator,
    body.dark-theme .token.entity,
    body.dark-theme .token.url,
    body.dark-theme .language-css .token.string,
    body.dark-theme .style .token.string {
      color: #d4d4d4 !important;
    }

    body.dark-theme .token.atrule,
    body.dark-theme .token.attr-value,
    body.dark-theme .token.keyword {
      color: #569cd6 !important;
    }

    body.dark-theme .token.function,
    body.dark-theme .token.class-name {
      color: #dcdcaa !important;
    }

    body.dark-theme .token.regex,
    body.dark-theme .token.important,
    body.dark-theme .token.variable {
      color: #d16969 !important;
    }

    body.dark-theme .token.important,
    body.dark-theme .token.bold {
      font-weight: bold !important;
    }

    body.dark-theme .token.italic {
      font-style: italic !important;
    }

    body.dark-theme .token.entity {
      cursor: help !important;
    }

    body.dark-theme .token.deleted {
      color: #f44336 !important;
    }

    /* Borders and dividers */
    body.dark-theme .markdown-section hr {
      border-color: #2a2a2a !important;
      background: #2a2a2a !important;
    }

    body.dark-theme .markdown-section blockquote {
      border-left-color: #3b82f6 !important;
    }

    /* Fix all borders in tables */
    body.dark-theme .markdown-section table {
      border-color: #2a2a2a !important;
    }

    /* Fix content margins/padding areas */
    body.dark-theme .content {
      border-color: #0a0a0a !important;
    }

    /* Fix any remaining gray areas */
    body.dark-theme main,
    body.dark-theme article,
    body.dark-theme section {
      background: #0a0a0a !important;
    }

    /* Light Theme Overrides */
    body.light-theme {
      --theme-color: #0969da;
      --base-background-color: #ffffff;
      --base-color: #24292f;
      --sidebar-background-color: #f6f8fa;
      --sidebar-nav-color: #57606a;
      --sidebar-nav-strong-color: #24292f;
      --code-background-color: #f6f8fa;
      --code-theme-color: #0550ae;
      --heading-color: #24292f;
      --link-color: #0969da;
      --blockquote-color: #57606a;
    }

    body.light-theme .theme-toggle .sun-icon {
      display: none;
    }

    body.dark-theme .theme-toggle .moon-icon {
      display: none;
    }

    .markdown-section {
      max-width: 900px;
    }

    .app-nav {
      background: var(--sidebar-background-color);
      padding: 1rem;
      border-radius: 0.5rem;
      margin: 1rem;
    }

    blockquote {
      border-left: 4px solid var(--theme-color);
      background: rgba(37, 99, 235, 0.1);
    }

    table {
      border-collapse: collapse;
      width: 100%;
    }

    th {
      background: var(--code-background-color);
    }
  </style>
</head>
<body>
  <!-- Theme Toggle Button -->
  <button class="theme-toggle" onclick="toggleTheme()" title="Toggle dark/light theme">
    <svg class="sun-icon" xmlns="http://www.w3.org/2000/svg" fill="none" viewBox="0 0 24 24" stroke="currentColor">
      <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M12 3v1m0 16v1m9-9h-1M4 12H3m15.364 6.364l-.707-.707M6.343 6.343l-.707-.707m12.728 0l-.707.707M6.343 17.657l-.707.707M16 12a4 4 0 11-8 0 4 4 0 018 0z" />
    </svg>
    <svg class="moon-icon" xmlns="http://www.w3.org/2000/svg" fill="none" viewBox="0 0 24 24" stroke="currentColor">
      <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M20.354 15.354A9 9 0 018.646 3.646 9.003 9.003 0 0012 21a9.003 9.003 0 008.354-5.646z" />
    </svg>
    <span class="theme-text">Theme</span>
  </button>

  <!-- Reader Mode Toggle Button -->
  <button class="reader-mode-toggle" onclick="toggleReaderMode()" title="Toggle reader mode (hide sidebar)">
    <svg xmlns="http://www.w3.org/2000/svg" fill="none" viewBox="0 0 24 24" stroke="currentColor">
      <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M12 6.253v13m0-13C10.832 5.477 9.246 5 7.5 5S4.168 5.477 3 6.253v13C4.168 18.477 5.754 18 7.5 18s3.332.477 4.5 1.253m0-13C13.168 5.477 14.754 5 16.5 5c1.747 0 3.332.477 4.5 1.253v13C19.832 18.477 18.247 18 16.5 18c-1.746 0-3.332.477-4.5 1.253" />
    </svg>
    <span class="reader-text">Reader</span>
  </button>

  <div id="app">Loading...</div>

  <script>
    window.$docsify = {
      name: 'LLM Fine-Tuning Guide',
      repo: 'https://github.com/Parv17k/llm-fine-tuning-guide',
      basePath: '/llm-fine-tuning-guide/',
      loadSidebar: true,
      loadNavbar: false,
      subMaxLevel: 0,
      auto2top: true,
      // External link support
      externalLinkTarget: '_blank',
      externalLinkRel: 'noopener',
      search: {
        maxAge: 86400000,
        paths: 'auto',
        placeholder: 'Search...',
        noData: 'No results found',
        depth: 6
      },
      pagination: {
        previousText: '← Previous',
        nextText: 'Next →',
        crossChapter: true,
        crossChapterText: true
      },
      markdown: {
        renderer: {
          code: function(code, lang) {
            if (lang === 'mermaid') {
              return '<div class="mermaid">' + code + '</div>';
            }
            // Use marked's default code renderer
            return marked.Renderer.prototype.code.apply(this, arguments);
          }
        }
      },
      plugins: [
        function(hook, vm) {
          hook.beforeEach(function(html) {
            return html + '\n\n---\n\n> Found an issue? [Edit this page on GitHub](' + vm.route.file + ')';
          });
        },
        // Initialize theme on load
        function(hook, vm) {
          hook.ready(function() {
            // Check for saved theme preference
            const savedTheme = localStorage.getItem('theme');
            if (savedTheme === 'light') {
              document.body.classList.add('light-theme');
              const themeCss = document.getElementById('theme-css');
              themeCss.href = '//cdn.jsdelivr.net/npm/docsify@4/themes/vue.min.css';
            } else {
              // Default to dark theme (already loaded)
              document.body.classList.add('dark-theme');
            }
          });
        }
      ]
    };

    // Theme Toggle Function
    function toggleTheme() {
      const themeCss = document.getElementById('theme-css');
      const isLight = document.body.classList.contains('light-theme');

      if (isLight) {
        // Switch to dark theme
        themeCss.href = '//cdn.jsdelivr.net/npm/docsify@4/themes/dark.min.css';
        document.body.classList.remove('light-theme');
        document.body.classList.add('dark-theme');
        localStorage.setItem('theme', 'dark');
      } else {
        // Switch to light theme
        themeCss.href = '//cdn.jsdelivr.net/npm/docsify@4/themes/vue.min.css';
        document.body.classList.remove('dark-theme');
        document.body.classList.add('light-theme');
        localStorage.setItem('theme', 'light');
      }
    }

    // Reader Mode Toggle Function
    function toggleReaderMode() {
      document.body.classList.toggle('reader-mode-active');
      const isActive = document.body.classList.contains('reader-mode-active');
      localStorage.setItem('readerMode', isActive ? 'active' : 'inactive');

      // Scroll to top when entering reader mode
      if (isActive) {
        window.scrollTo(0, 0);
      }
    }
  </script>

  <!-- Docsify Core -->
  <script src="//cdn.jsdelivr.net/npm/docsify@4"></script>

  <!-- Search Plugin -->
  <script src="//cdn.jsdelivr.net/npm/docsify@4/lib/plugins/search.min.js"></script>

  <!-- Pagination Plugin -->
  <script src="//cdn.jsdelivr.net/npm/docsify-pagination@latest/dist/docsify-pagination.min.js"></script>

  <!-- Mermaid Diagrams -->
  <script type="module">
    import mermaid from 'https://cdn.jsdelivr.net/npm/mermaid@10/dist/mermaid.esm.min.mjs';
    mermaid.initialize({
      startOnLoad: true,
      theme: 'dark',
      securityLevel: 'loose',
    });
    window.mermaid = mermaid;
  </script>
  <script src="//cdn.jsdelivr.net/npm/docsify-mermaid@2.0.1/dist/docsify-mermaid.js"></script>

  <!-- Copy Code Plugin -->
  <script src="//cdn.jsdelivr.net/npm/docsify-copy-code"></script>

  <!-- External Scripts -->
  <script src="//cdn.jsdelivr.net/npm/prismjs@1/components/prism-python.min.js"></script>
  <script src="//cdn.jsdelivr.net/npm/prismjs@1/components/prism-bash.min.js"></script>
  <script src="//cdn.jsdelivr.net/npm/prismjs@1/components/prism-json.min.js"></script>
</body>
</html>
