<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>LLM Fine-Tuning Guide</title>
  <meta name="description" content="A Step-by-Step Guide for Technical People - Learn to fine-tune LLMs from scratch">

  <!-- Docsify Theme CSS -->
  <link rel="stylesheet" href="//cdn.jsdelivr.net/npm/docsify@4/themes/vue.min.css" id="theme-css" />

  <!-- Theme Toggle Styles -->
  <style>
    .theme-toggle {
      position: fixed;
      top: 1rem;
      right: 1rem;
      z-index: 1000;
      background: #161b22;
      border: 1px solid #30363d;
      border-radius: 0.5rem;
      padding: 0.5rem 1rem;
      cursor: pointer;
      color: #c9d1d9;
      font-size: 0.875rem;
      display: flex;
      align-items: center;
      gap: 0.5rem;
      transition: all 0.2s ease;
    }

    .theme-toggle:hover {
      background: #21262d;
    }

    .theme-toggle svg {
      width: 18px;
      height: 18px;
    }

    /* Reader Mode Styles */
    .reader-mode-active .sidebar,
    .reader-mode-active .app-nav {
      display: none !important;
    }

    .reader-mode-active .content {
      margin-left: 0 !important;
      max-width: 800px !important;
      margin: 0 auto;
      padding: 2rem;
    }

    .reader-mode-toggle {
      position: fixed;
      top: 1rem;
      right: 8rem;
      z-index: 1000;
      background: #161b22;
      border: 1px solid #30363d;
      border-radius: 0.5rem;
      padding: 0.5rem 1rem;
      cursor: pointer;
      color: #c9d1d9;
      font-size: 0.875rem;
      display: flex;
      align-items: center;
      gap: 0.5rem;
      transition: all 0.2s ease;
    }

    .reader-mode-toggle:hover {
      background: #21262d;
    }

    /* Dark Theme Overrides */
    body.dark-theme {
      --theme-color: #2563eb;
      --base-background-color: #0d1117;
      --base-color: #c9d1d9;
      --sidebar-background-color: #161b22;
      --sidebar-nav-color: #8b949e;
      --sidebar-nav-strong-color: #f0f6fc;
      --code-background-color: #21262d;
      --code-theme-color: #58a6ff;
      --heading-color: #f0f6fc;
      --link-color: #58a6ff;
      --blockquote-color: #8b949e;
    }

    /* Light Theme Overrides */
    body.light-theme {
      --theme-color: #0969da;
      --base-background-color: #ffffff;
      --base-color: #24292f;
      --sidebar-background-color: #f6f8fa;
      --sidebar-nav-color: #57606a;
      --sidebar-nav-strong-color: #24292f;
      --code-background-color: #f6f8fa;
      --code-theme-color: #0550ae;
      --heading-color: #24292f;
      --link-color: #0969da;
      --blockquote-color: #57606a;
    }

    body.light-theme .theme-toggle .sun-icon {
      display: none;
    }

    body.dark-theme .theme-toggle .moon-icon {
      display: none;
    }

    .markdown-section {
      max-width: 900px;
    }

    .app-nav {
      background: var(--sidebar-background-color);
      padding: 1rem;
      border-radius: 0.5rem;
      margin: 1rem;
    }

    blockquote {
      border-left: 4px solid var(--theme-color);
      background: rgba(37, 99, 235, 0.1);
    }

    table {
      border-collapse: collapse;
      width: 100%;
    }

    th {
      background: var(--code-background-color);
    }
  </style>
</head>
<body>
  <!-- Theme Toggle Button -->
  <button class="theme-toggle" onclick="toggleTheme()" title="Toggle dark/light theme">
    <svg class="sun-icon" xmlns="http://www.w3.org/2000/svg" fill="none" viewBox="0 0 24 24" stroke="currentColor">
      <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M12 3v1m0 16v1m9-9h-1M4 12H3m15.364 6.364l-.707-.707M6.343 6.343l-.707-.707m12.728 0l-.707.707M6.343 17.657l-.707.707M16 12a4 4 0 11-8 0 4 4 0 018 0z" />
    </svg>
    <svg class="moon-icon" xmlns="http://www.w3.org/2000/svg" fill="none" viewBox="0 0 24 24" stroke="currentColor">
      <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M20.354 15.354A9 9 0 018.646 3.646 9.003 9.003 0 0012 21a9.003 9.003 0 008.354-5.646z" />
    </svg>
    <span class="theme-text">Theme</span>
  </button>

  <!-- Reader Mode Toggle Button -->
  <button class="reader-mode-toggle" onclick="toggleReaderMode()" title="Toggle reader mode (hide sidebar)">
    <svg xmlns="http://www.w3.org/2000/svg" fill="none" viewBox="0 0 24 24" stroke="currentColor">
      <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M12 6.253v13m0-13C10.832 5.477 9.246 5 7.5 5S4.168 5.477 3 6.253v13C4.168 18.477 5.754 18 7.5 18s3.332.477 4.5 1.253m0-13C13.168 5.477 14.754 5 16.5 5c1.747 0 3.332.477 4.5 1.253v13C19.832 18.477 18.247 18 16.5 18c-1.746 0-3.332.477-4.5 1.253" />
    </svg>
    <span class="reader-text">Reader</span>
  </button>

  <div id="app">Loading...</div>

  <script>
    window.$docsify = {
      name: 'LLM Fine-Tuning Guide',
      repo: 'https://github.com/Parv17k/llm-fine-tuning-guide',
      basePath: '/llm-fine-tuning-guide/',
      loadSidebar: true,
      loadNavbar: true,
      subMaxLevel: 3,
      auto2top: true,
      // External link support
      externalLinkTarget: '_blank',
      externalLinkRel: 'noopener',
      search: {
        maxAge: 86400000,
        paths: 'auto',
        placeholder: 'Search...',
        noData: 'No results found',
        depth: 6
      },
      pagination: {
        previousText: '← Previous',
        nextText: 'Next →',
        crossChapter: true,
        crossChapterText: true
      },
      plugins: [
        function(hook, vm) {
          hook.beforeEach(function(html) {
            return html + '\n\n---\n\n> Found an issue? [Edit this page on GitHub](' + vm.route.file + ')';
          });
        },
        // Initialize theme on load
        function(hook, vm) {
          hook.ready(function() {
            // Check for saved theme preference
            const savedTheme = localStorage.getItem('theme');
            if (savedTheme === 'light') {
              document.body.classList.add('light-theme');
            } else {
              // Default to dark theme
              document.body.classList.add('dark-theme');
              const themeCss = document.getElementById('theme-css');
              themeCss.href = '//cdn.jsdelivr.net/npm/docsify-dark@0.11.1/themes/dark.min.css';
            }
          });
        }
      ]
    };

    // Theme Toggle Function
    function toggleTheme() {
      const themeCss = document.getElementById('theme-css');
      const isLight = document.body.classList.contains('light-theme');

      if (isLight) {
        // Switch to dark theme
        themeCss.href = '//cdn.jsdelivr.net/npm/docsify-dark@0.11.1/themes/dark.min.css';
        document.body.classList.remove('light-theme');
        document.body.classList.add('dark-theme');
        localStorage.setItem('theme', 'dark');
      } else {
        // Switch to light theme
        themeCss.href = '//cdn.jsdelivr.net/npm/docsify@4/themes/vue.min.css';
        document.body.classList.remove('dark-theme');
        document.body.classList.add('light-theme');
        localStorage.setItem('theme', 'light');
      }
    }

    // Reader Mode Toggle Function
    function toggleReaderMode() {
      document.body.classList.toggle('reader-mode-active');
      const isActive = document.body.classList.contains('reader-mode-active');
      localStorage.setItem('readerMode', isActive ? 'active' : 'inactive');

      // Scroll to top when entering reader mode
      if (isActive) {
        window.scrollTo(0, 0);
      }
    }
  </script>

  <!-- Docsify Core -->
  <script src="//cdn.jsdelivr.net/npm/docsify@4"></script>

  <!-- Search Plugin -->
  <script src="//cdn.jsdelivr.net/npm/docsify@4/lib/plugins/search.min.js"></script>

  <!-- Pagination Plugin -->
  <script src="//cdn.jsdelivr.net/npm/docsify-pagination@latest/dist/docsify-pagination.min.js"></script>

  <!-- Mermaid Diagrams -->
  <script src="//cdn.jsdelivr.net/npm/mermaid@10/dist/mermaid.min.js"></script>
  <script>
    window.mermaid.initialize({ startOnLoad: true, theme: 'dark' });
  </script>

  <!-- Copy Code Plugin -->
  <script src="//cdn.jsdelivr.net/npm/docsify-copy-code"></script>

  <!-- External Scripts -->
  <script src="//cdn.jsdelivr.net/npm/prismjs@1/components/prism-python.min.js"></script>
  <script src="//cdn.jsdelivr.net/npm/prismjs@1/components/prism-bash.min.js"></script>
  <script src="//cdn.jsdelivr.net/npm/prismjs@1/components/prism-json.min.js"></script>
</body>
</html>
